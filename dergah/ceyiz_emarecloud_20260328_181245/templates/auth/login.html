<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmareCloud</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh; overflow: hidden;
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #e2e8f0;
            display: flex; flex-direction: column;
        }
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0; pointer-events: none;
        }
        .bg-glow {
            position: fixed; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
            top: -200px; left: -100px; z-index: 0; pointer-events: none;
            animation: slowdrift 20s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(147,51,234,0.06) 0%, transparent 70%);
            bottom: -100px; right: -100px; z-index: 0; pointer-events: none;
            animation: slowdrift 25s ease-in-out infinite alternate-reverse;
        }
        @keyframes slowdrift {
            from { transform: translate(0,0); } to { transform: translate(40px,30px); }
        }
        /* Header */
        .chat-header {
            position: relative; z-index: 10;
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.9rem 1.5rem;
            background: rgba(15,15,25,0.85);
            border-bottom: 1px solid rgba(99,102,241,0.12);
            backdrop-filter: blur(12px); flex-shrink: 0;
        }
        .header-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #9333ea);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff; position: relative; flex-shrink: 0;
        }
        .header-avatar::after {
            content: ''; position: absolute; bottom: 1px; right: 1px;
            width: 9px; height: 9px; background: #22c55e;
            border-radius: 50%; border: 2px solid #0a0a0f;
        }
        .header-info h2 { font-size: 0.9rem; font-weight: 600; color: #f1f5f9; }
        .header-info span { font-size: 0.72rem; color: #22c55e; }
        .header-brand {
            margin-left: auto; font-size: 0.78rem;
            color: rgba(148,163,184,0.45); font-weight: 500; letter-spacing: 0.04em;
        }
        /* Messages */
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 2rem 1rem;
            position: relative; z-index: 10;
            display: flex; flex-direction: column; gap: 1.2rem;
            max-width: 720px; width: 100%; margin: 0 auto;
            scrollbar-width: thin; scrollbar-color: rgba(99,102,241,0.3) transparent;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 4px; }
        .msg { display: flex; gap: 0.7rem; align-items: flex-end; animation: msgIn 0.3s ease both; }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg.user { flex-direction: row-reverse; }
        .msg-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; flex-shrink: 0;
        }
        .msg.ai    .msg-avatar { background: linear-gradient(135deg, #6366f1, #9333ea); color: #fff; }
        .msg.user  .msg-avatar { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); color: #818cf8; }
        .msg.error .msg-avatar { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
        .msg-bubble { max-width: 75%; padding: 0.75rem 1rem; border-radius: 16px; font-size: 0.92rem; line-height: 1.6; }
        .msg.ai    .msg-bubble { background: rgba(20,20,40,0.85); border: 1px solid rgba(99,102,241,0.15); border-bottom-left-radius: 4px; color: #e2e8f0; }
        .msg.user  .msg-bubble { background: linear-gradient(135deg, #4f46e5, #7c3aed); border-bottom-right-radius: 4px; color: #fff; }
        .msg.error .msg-bubble { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.18); border-bottom-left-radius: 4px; color: #f87171; }
        /* Typing dots */
        .typing-indicator { display: flex; gap: 0.7rem; align-items: flex-end; animation: msgIn 0.2s ease both; }
        .typing-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #9333ea); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; flex-shrink: 0;
        }
        .typing-dots {
            display: flex; gap: 4px; align-items: center;
            padding: 0.75rem 1rem;
            background: rgba(20,20,40,0.85);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 16px; border-bottom-left-radius: 4px;
        }
        .typing-dots span { width: 6px; height: 6px; background: rgba(99,102,241,0.6); border-radius: 50%; animation: dot-bounce 1.2s infinite ease; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30%            { transform: translateY(-5px); opacity: 1; }
        }
        /* Input */
        .chat-input-area {
            position: relative; z-index: 10; padding: 1rem;
            background: rgba(10,10,20,0.92);
            border-top: 1px solid rgba(99,102,241,0.1);
            backdrop-filter: blur(12px); flex-shrink: 0;
        }
        .input-label { text-align: center; font-size: 0.7rem; color: rgba(148,163,184,0.4); margin-bottom: 0.45rem; letter-spacing: 0.03em; }
        .chat-input-wrap { max-width: 720px; margin: 0 auto; display: flex; gap: 0.6rem; align-items: center; }
        .chat-input-box {
            flex: 1; background: rgba(20,20,40,0.9);
            border: 1px solid rgba(99,102,241,0.2); border-radius: 12px;
            padding: 0.7rem 1rem; color: #e2e8f0; font-size: 0.92rem;
            font-family: inherit; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .chat-input-box:focus { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .chat-input-box::placeholder { color: rgba(148,163,184,0.35); }
        .chat-input-box[type="password"] { letter-spacing: 0.15em; }
        .chat-send-btn {
            width: 42px; height: 42px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #9333ea);
            color: #fff; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .chat-send-btn:hover { opacity: 0.85; transform: scale(1.05); }
        .chat-send-btn:active { transform: scale(0.95); }
        .chat-send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
        #actual-form { display: none; }
        .register-link {
            text-align: center; font-size: 0.78rem;
            color: rgba(148,163,184,0.45); margin-top: 0.5rem;
        }
        .register-link a { color: #818cf8; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
        /* Overlay */
        .submit-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(10,10,20,0.75); z-index: 100;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 1rem; backdrop-filter: blur(8px);
        }
        .submit-overlay.active { display: flex; }
        .spin-ring { width: 48px; height: 48px; border: 3px solid rgba(99,102,241,0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .submit-overlay p { font-size: 0.88rem; color: rgba(148,163,184,0.7); }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <!-- Header -->
    <div class="chat-header">
        <div class="header-avatar"><i class="fas fa-robot"></i></div>
        <div class="header-info">
            <h2>Emare</h2>
            <span><i class="fas fa-circle" style="font-size:0.45rem;"></i> Çevrimiçi</span>
        </div>
        <div class="header-brand">EmareCloud</div>
    </div>

    <!-- Chat -->
    <div class="chat-messages" id="chat-messages"></div>

    <!-- Input -->
    <div class="chat-input-area">
        <div class="input-label" id="input-label">Hazırlanıyor…</div>
        <div class="chat-input-wrap">
            <input class="chat-input-box" id="chat-input"
                   type="text" placeholder=""
                   autocomplete="off" autocorrect="off"
                   autocapitalize="off" spellcheck="false">
            <button class="chat-send-btn" id="send-btn" type="button" disabled>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        <div class="register-link">Henüz hesabın yok mu? <a href="{{ url_for('auth.register') }}">Üye Ol</a></div>
    </div>

    <!-- Real POST form (hidden) -->
    <form id="actual-form" method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="username" id="form-username">
        <input type="hidden" name="password" id="form-password">
        <input type="hidden" name="remember" value="">
    </form>

    <!-- Loading overlay -->
    <div class="submit-overlay" id="submit-overlay">
        <div class="spin-ring"></div>
        <p>Kimlik doğrulanıyor…</p>
    </div>

    <!-- Server flash errors (injected by Jinja2) -->
    <div id="server-errors" style="display:none;"
         data-errors="{{ get_flashed_messages(with_categories=true)|tojson }}"></div>

    <script>
    (function () {
        var msgsEl  = document.getElementById('chat-messages');
        var inputEl = document.getElementById('chat-input');
        var sendBtn = document.getElementById('send-btn');
        var labelEl = document.getElementById('input-label');
        var overlay = document.getElementById('submit-overlay');

        var state            = 'greeting';
        var capturedUsername = '';

        function esc(s) {
            return String(s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }

        function addMsg(role, html) {
            var wrap = document.createElement('div');
            wrap.className = 'msg ' + role;
            var av = document.createElement('div');
            av.className = 'msg-avatar';
            av.innerHTML = role === 'user'
                ? '<i class="fas fa-user"></i>'
                : role === 'error'
                    ? '<i class="fas fa-exclamation-triangle"></i>'
                    : '<i class="fas fa-robot"></i>';
            var bub = document.createElement('div');
            bub.className = 'msg-bubble';
            bub.innerHTML = html;
            if (role === 'user') { wrap.appendChild(bub); wrap.appendChild(av); }
            else                 { wrap.appendChild(av);  wrap.appendChild(bub); }
            msgsEl.appendChild(wrap);
            scroll();
        }

        function showTyping() {
            var wrap = document.createElement('div');
            wrap.className = 'typing-indicator'; wrap.id = 'typing-el';
            wrap.innerHTML =
                '<div class="typing-avatar"><i class="fas fa-robot"></i></div>' +
                '<div class="typing-dots"><span></span><span></span><span></span></div>';
            msgsEl.appendChild(wrap); scroll();
        }

        function hideTyping() {
            var t = document.getElementById('typing-el');
            if (t) t.remove();
        }

        function aiSay(html, preDelay) {
            preDelay = (preDelay === undefined) ? 500 : preDelay;
            return new Promise(function (resolve) {
                setTimeout(function () {
                    showTyping();
                    var readTime = Math.min(1400, 350 + html.replace(/<[^>]*>/g, '').length * 22);
                    setTimeout(function () { hideTyping(); addMsg('ai', html); resolve(); }, readTime);
                }, preDelay);
            });
        }

        function setReady(placeholder, label, type) {
            inputEl.type        = type || 'text';
            inputEl.placeholder = placeholder;
            inputEl.value       = '';
            inputEl.disabled    = false;
            sendBtn.disabled    = false;
            labelEl.textContent = label;
            setTimeout(function () { inputEl.focus(); }, 50);
        }

        function setWaiting() { inputEl.disabled = true; sendBtn.disabled = true; }

        function getFlashErrors() {
            try {
                return JSON.parse(document.getElementById('server-errors').dataset.errors) || [];
            } catch (e) { return []; }
        }

        /* ── Greeting ── */
        async function greet() {
            setWaiting();
            labelEl.textContent = 'Lütfen bekleyin…';
            await aiSay('Merhaba! 👋 Ben <strong>Emare</strong> — EmareCloud altyapı asistanınız.', 500);
            await aiSay('Sisteme giriş yapmanıza yardımcı olmaktan memnuniyet duyarım.', 100);
            var errors = getFlashErrors();
            if (errors.length) {
                for (var i = 0; i < errors.length; i++) { addMsg('error', esc(errors[i][1])); scroll(); }
                await aiSay('Bir sorun oluştu. Tekrar denemek ister misiniz?<br>Kullanıcı adınızı girin.', 300);
            } else {
                await aiSay('Başlamak için lütfen <strong>kullanıcı adınızı</strong> girin.', 100);
            }
            state = 'username';
            setReady('Kullanıcı adı…', 'Enter ile gönder', 'text');
        }

        /* ── Handle send ── */
        async function handleSend() {
            var val = inputEl.value.trim();
            if (!val) return;

            if (state === 'username') {
                capturedUsername = val;
                addMsg('user', esc(val));
                setWaiting();
                await aiSay('Merhaba <strong>' + esc(capturedUsername) + '</strong>! 🙂<br>Şimdi <strong>şifrenizi</strong> girin.', 300);
                state = 'password';
                setReady('••••••••', 'Şifrenizi girin ve Enter’a basın', 'password');

            } else if (state === 'password') {
                var pwd = val;
                addMsg('user', '&bull;'.repeat(Math.min(pwd.length, 10)));
                setWaiting();
                state = 'submitting';
                await aiSay('Kimliğiniz doğrulanıyor… 🔐', 200);
                document.getElementById('form-username').value = capturedUsername;
                document.getElementById('form-password').value = pwd;
                overlay.classList.add('active');
                setTimeout(function () { document.getElementById('actual-form').submit(); }, 600);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); handleSend(); }
        });

        greet();
    }());
    </script>
</body>
</html>
